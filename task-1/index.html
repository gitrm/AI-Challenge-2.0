<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Company Leader Board 2025</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="page-header">
    <div class="container">
      <h1 class="page-title">Company Leader Board 2025</h1>
    </div>
  </header>

  <main class="container">
    <section class="leaderboard-card">
      <header class="card-header">
        <h2 class="card-title">Leaderboard</h2>
        <p class="card-subtitle">Top performers based on contributions and activity</p>
      </header>

      <div class="filter-bar" role="search">
        <div class="select-wrap" id="filter-year">
          <button type="button" class="select" aria-haspopup="listbox" aria-expanded="false" aria-label="Filter by year">
            <span class="select-value">All Years</span>
            <i class="ms-Icon select-chevron" data-icon-name="ChevronDown" aria-hidden="true"></i>
          </button>
          <ul class="dd-list" role="listbox" hidden></ul>
        </div>

        <div class="select-wrap" id="filter-quarter">
          <button type="button" class="select" aria-haspopup="listbox" aria-expanded="false" aria-label="Filter by quarter">
            <span class="select-value">All Quarters</span>
            <i class="ms-Icon select-chevron" data-icon-name="ChevronDown" aria-hidden="true"></i>
          </button>
          <ul class="dd-list" role="listbox" hidden></ul>
        </div>

        <div class="select-wrap" id="filter-category">
          <button type="button" class="select" aria-haspopup="listbox" aria-expanded="false" aria-label="Filter by category">
            <span class="select-value">All Categories</span>
            <i class="ms-Icon select-chevron" data-icon-name="ChevronDown" aria-hidden="true"></i>
          </button>
          <ul class="dd-list" role="listbox" hidden></ul>
        </div>

        <label class="search-wrap">
          <span class="visually-hidden">Search employee</span>
          <i class="ms-Icon ms-SearchBox-icon search-icon" data-icon-name="Search" aria-hidden="true"></i>
          <input id="search" type="search" autocomplete="off" placeholder="Search employee..." />
        </label>
      </div>

      <section class="podium" id="podium" aria-label="Top 3 performers"></section>

      <ol class="ranking-list" id="ranking-list" aria-label="Full ranking"></ol>

      <p class="empty-state" id="empty-state" hidden>No employees match your filters.</p>
    </section>
  </main>

  <!-- Reusable templates -->
  <template id="tpl-podium-slot">
    <div class="podium-slot">
      <div class="podium-avatar-wrap">
        <img class="podium-avatar" alt="" />
        <span class="podium-rank-badge"></span>
      </div>
      <h3 class="podium-name"></h3>
      <p class="podium-role"></p>
      <div class="podium-score">
        <i class="ms-Icon star-icon" data-icon-name="FavoriteStarFill" aria-hidden="true"></i>
        <span class="podium-points"></span>
      </div>
      <div class="podium-block"><span class="podium-block-num"></span></div>
    </div>
  </template>

  <template id="tpl-row">
    <li class="row">
      <button class="row-summary" aria-expanded="false">
        <span class="row-rank"></span>
        <img class="row-avatar" alt="" />
        <span class="row-identity">
          <span class="row-name"></span>
          <span class="row-role"></span>
        </span>
        <span class="row-counters"></span>
        <span class="row-total">
          <span class="row-total-label">TOTAL</span>
          <span class="row-total-value">
            <i class="ms-Icon star-icon" data-icon-name="FavoriteStarFill" aria-hidden="true"></i>
            <span class="row-total-num"></span>
          </span>
        </span>
        <span class="row-chevron" aria-hidden="true">
          <i class="ms-Icon" data-icon-name="ChevronDown" aria-hidden="true"></i>
        </span>
      </button>
      <div class="row-panel" hidden>
        <h4 class="row-panel-title">Recent activity</h4>
        <table class="activity-table">
          <colgroup>
            <col class="col-activity" />
            <col class="col-category" />
            <col class="col-date" />
            <col class="col-points" />
          </colgroup>
          <thead>
            <tr>
              <th class="col-activity">Activity</th>
              <th class="col-category">Category</th>
              <th class="col-date">Date</th>
              <th class="col-points">Points</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </li>
  </template>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
